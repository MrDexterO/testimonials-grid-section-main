<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=
    , initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --clr: hsl(27, 100%, 50%);
        }

        button {
            width: 200px;
            padding: 20px;
            border-radius: 0.5rem;

            background-color: hsl(from var(--clr) h s l /15%);
            color: var(--clr);
            border: 1px solid var(--clr);

            font-size: 24px;

            cursor: pointer;

            &:hover {

                background-color: hsl(from var(--clr) h s l /1);
                color: white;
                border: 1px solid var(--clr);

            }
        }
    </style>
</head>
